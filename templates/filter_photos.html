}

.upload-card.uploading .upload-progress-bar {

.upload-card.scanning .upload-progress-bar {

}

.upload-card.done .upload-progress-bar {
    background: #22c55e;
}

.upload-card.failed .upload-progress-bar {

.upload-card.waiting .upload-status {
    color: #64748b;
}

.upload-card.uploading .upload-status {
    color: #7c3aed;
}

.upload-card.scanning .upload-status {
    color: #f97316;
}

.upload-card.done .upload-status {
    color: #16a34a;

    color: #dc2626;

}

.scan-summary-card {

}

.summary-icon {

</div>

<script>
const input = document.getElementById("photoInput");
const queue = document.getElementById("uploadQueue");
const viewResultsBtn = document.getElementById("viewResultsBtn");

function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + " B";
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(1) + " MB";
}

function createUploadCard(file) {
    const card = document.createElement("div");
    card.className = "upload-card waiting";

    card.innerHTML = `
        <div class="upload-card-header">
            <div>
                <div class="upload-file-name">${file.name}</div>
                <div class="upload-file-size">${formatFileSize(file.size)}</div>
            </div>
            <div class="upload-status">Waiting...</div>
        </div>

        <div class="upload-progress-bg">
            <div class="upload-progress-bar"></div>
        </div>
    `;

    queue.appendChild(card);

    return {
        card,
        bar: card.querySelector(".upload-progress-bar"),
        status: card.querySelector(".upload-status")
    };
}

function setCardStatus(ui, status, percent, text) {
    ui.card.classList.remove("waiting", "uploading", "scanning", "done", "failed");
    ui.card.classList.add(status);

    ui.bar.style.width = percent + "%";
    ui.status.textContent = text;
}

input.addEventListener("change", async function () {
    queue.innerHTML = "";
    scanSummary.style.display = "none";
    scanSummary.innerHTML = "";

    viewResultsBtn.classList.remove("show");

    const files = Array.from(input.files || []);

    if (!files.length) {
        return;
    }

    await uploadAndScanAllFiles(files);

    viewResultsBtn.classList.add("show");

    // optional auto redirect:
    // window.location.href = "{{ url_for('family_album') }}";
});

function uploadAndScanFile(file, ui) {
    return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append("photo", file);

        const xhr = new XMLHttpRequest();

        xhr.open("POST", "{{ url_for('scan_one_photo_ajax') }}", true);

        xhr.upload.onprogress = function (event) {
            if (event.lengthComputable) {
                const percent = Math.round((event.loaded / event.total) * 100);
                setCardStatus(ui, "uploading", percent, `Uploading ${percent}%`);
            }
        };

        xhr.onloadstart = function () {
            setCardStatus(ui, "uploading", 1, "Uploading 1%");
        };

        xhr.onload = function () {
            if (xhr.status !== 200) {
                setCardStatus(ui, "failed", 100, "Failed");
                reject();
                return;
            }

            let response;

            try {
                response = JSON.parse(xhr.responseText);
            } catch (err) {
                setCardStatus(ui, "failed", 100, "Bad response");
                reject();
                return;
            }

            if (!response.ok) {
                setCardStatus(ui, "failed", 100, "Failed");
                reject();
                return;
            }

            const result = response.result || {};

            const confirmedNames = result.confirmed_names || [];
            const possibleNames = result.possible_names || [];

            const confirmedCount = result.confirmed_count || confirmedNames.length || 0;
            const possibleCount = result.possible_count || possibleNames.length || 0;
            const skippedCount = result.skipped_count || 0;

            let details = [];

            if (confirmedCount > 0) {
                details.push(`✓ Confirmed: ${confirmedNames.join(", ")}`);
            }

            if (possibleCount > 0) {
                details.push(`? Possible: ${possibleNames.join(", ")}`);
            }

            if (skippedCount > 0) {
                details.push(`${skippedCount} skipped`);
            }

            if (details.length === 0) {
                details.push("✓ Done");
            }

            setCardStatus(ui, "done", 100, details.join(" | "));

            resolve({
                confirmedCount,
                possibleCount,
                skippedCount,
                confirmedNames,
                possibleNames
            });
        };

        xhr.onerror = function () {
            setCardStatus(ui, "failed", 100, "Failed");
            reject();
        };

        xhr.upload.onload = function () {
            setCardStatus(ui, "scanning", 45, "Scanning...");
        };

        xhr.send(formData);
    });
}



async function uploadAndScanAllFiles(files) {
    const summaryEl = document.getElementById("scanSummary");
    const viewBtn = document.getElementById("viewResultsBtn");

    let totalConfirmed = 0;
    let totalPossible = 0;
    let totalSkipped = 0;

    let allConfirmedNames = [];
    let allPossibleNames = [];

    summaryEl.style.display = "none";
    viewBtn.style.display = "none";

    for (const file of files) {
        const ui = createUploadCard(file);

        try {
            const result = await uploadAndScanFile(file, ui);

            if (result.confirmedCount > 0) {
                totalConfirmed += 1;
            } else if (result.possibleCount > 0) {
                totalPossible += 1;
            } else {
                totalSkipped += 1;
            }

            allConfirmedNames.push(...result.confirmedNames);
            allPossibleNames.push(...result.possibleNames);

        } catch (err) {
            totalSkipped += 1;
        }
    }

    const uniqueConfirmed = [...new Set(allConfirmedNames)];
    const uniquePossible = [...new Set(allPossibleNames)];

    summaryEl.innerHTML = `
        <div class="scan-summary-card">
            <div class="summary-icon">✅</div>

            <h3>Upload complete</h3>

            <div class="summary-grid">
                <a class="summary-item confirmed" href="{{ url_for('family_album') }}">
                    <strong>${totalConfirmed}</strong>
                    <span>confirmed photos</span>
                </a>

                <a class="summary-item possible" href="{{ url_for('review_page') }}">
                    <strong>${totalPossible}</strong>
                    <span>possible sent to review</span>
                </a>

                <a class="summary-item skipped" href="{{ url_for('review_page') }}">
                    <strong>${totalSkipped}</strong>
                    <span>skipped sent to review</span>
                </a>
            </div>

            ${uniqueConfirmed.length ? `
                <div class="summary-members">
                    <div class="summary-label">Confirmed family members</div>
                    <div class="member-chip-row">
                        ${uniqueConfirmed.map(name => `
                            <a class="member-chip"
                            href="/member-by-name/${encodeURIComponent(name)}/album">
                                ${name}
                            </a>
                        `).join("")}
                    </div>
                </div>
            ` : ""}
        </div>
    `;

    summaryEl.style.display = "block";
    viewBtn.style.display = "inline-flex";
}
</script>
