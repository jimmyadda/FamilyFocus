{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<style>
.auth-page {
    min-height: calc(100vh - 120px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
}

.auth-card {
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 28px;
    padding: 34px;
    box-shadow: 0 18px 45px rgba(15, 23, 42, .12);
}

.auth-logo {
    text-align: center;
    margin-bottom: 22px;
}

.auth-logo h1 {
    margin: 0;
    font-size: 32px;
    font-weight: 900;
    /*background: linear-gradient(135deg, #fb923c, #ec4899, #8b5cf6);*/
        background: linear-gradient(135deg, #f97316, #14b8a6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.auth-logo p {
    margin-top: 8px;
    color: #64748b;
    font-weight: 600;
}

.auth-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.auth-field label {
    display: block;
    margin-bottom: 7px;
    color: #334155;
    font-weight: 800;
    font-size: 14px;
}

.auth-field input {
    width: 100%;
    border: 1px solid #cbd5e1;
    border-radius: 16px;
    padding: 13px 15px;
    font-size: 15px;
    outline: none;
}

.auth-field input:focus {
    border-color: #fb923c;
    box-shadow: 0 0 0 4px rgba(251, 146, 60, .18);
}

.auth-form .auth-btn {
    margin-top: 8px;
    border: none;
    border-radius: 18px;
    padding: 14px 18px;
    background: linear-gradient(135deg, #f97316, #14b8a6)!important;
    color: white;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
}

.auth-footer {
    text-align: center;
    margin-top: 18px;
    color: #64748b;
    font-weight: 600;
}

.auth-footer a {
color: #64748b !important;
    font-weight: 999;
    text-decoration: underline;
}
</style>

<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <h1>Family Focus</h1>
            <p>Create your private family space</p>
        </div>

        <form class="auth-form" method="POST">

            <div class="auth-field">
                <label>Family Name</label>
                <input type="text" name="family_name" required>
            </div>

            <div class="auth-field">
                <label>First Name</label>
                <input type="text" name="first_name" required>
            </div>

            <div class="auth-field">
                <label>Last Name</label>
                <input type="text" name="last_name" required>
            </div>

            <div class="auth-field">
                <label>Email</label>
                <input type="email" name="email" required autocomplete="email">
            </div>

            <div class="auth-field">
                <label>Password</label>
                <input type="password" name="password" required autocomplete="new-password">
            </div>

            <button class="auth-btn" type="submit">
                Create Account
            </button>

        </form>

        <div class="auth-footer">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </div>

    </div>
</div>

{% endblock %}
